<!DOCTYPE html>
<html>
<head>

<style>

/* CSS */

body{
background:
linear-gradient(
rgba(0,0,0,.45),
rgba(0,0,0,.55)
),
url("images/farm-bg.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

font-family:'Segoe UI',sans-serif;
margin:0;
}

.navbar{
background:rgba(0,0,0,.35);
backdrop-filter:blur(10px);
padding:15px;
}

.hero{
height:300px;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.card{
background:rgba(255,255,255,.92);
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

select,input{
padding:12px;
border-radius:10px;
border:none;
}

button{
padding:12px 20px;
background:#2f6b3f;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="navbar">
🌾 Maharashtra Agriculture
</div>

<div class="hero">

<div>

<h1>
📈 Profit & Risk Prediction
</h1>

<p>
AI Powered Prediction System
</p>

</div>

</div>

<div class="container">

<div class="card">

<h2>Select Details</h2>

<select id="crop">
<option>Soybean</option>
<option>Cotton</option>
<option>Onion</option>
</select>

<select id="district">
<option>Pune</option>
<option>Nashik</option>
<option>Nagpur</option>
</select>

<input
type="number"
id="area"
placeholder="Area in Hectare"
>

<button onclick="predictData()">
Predict
</button>

</div>

<div class="grid">

<div class="card">

<h3>💰 Profit Prediction</h3>

<h1 id="profit">
₹ --
</h1>

<p id="yield">
Yield : --
</p>

<p id="price">
Market Price : --
</p>

</div>

<div class="card">

<h3>⚠ Risk Prediction</h3>

<h1 id="risk">
--
</h1>

<p id="riskScore">
Score : --
</p>

</div>

</div>

</div>

<script>

async function predictData(){

try{

const response=await fetch(
"http://localhost:8000/predict-profit",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
crop:
document.getElementById("crop").value,

district:
document.getElementById("district").value,

area:
document.getElementById("area").value
})
}
);

const data=
await response.json();

document.getElementById("profit")
.innerHTML=
"₹"+data.expected_profit;

document.getElementById("yield")
.innerHTML=
"Yield : "+data.expected_yield;

document.getElementById("price")
.innerHTML=
"Price : ₹"+data.market_price;

}
catch(error){

alert("Prediction Error");

}

}

</script>

</body>
</html>
