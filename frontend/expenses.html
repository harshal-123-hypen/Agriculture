<!DOCTYPE html>
<html>
<head>

<title>Farm Expense Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="script.js"></script>

<style>

.expense-container{
padding:40px;
max-width:1200px;
margin:auto;
}

.expense-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.expense-card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.total-card{
margin-top:20px;
background:#2E7D32;
color:white;
padding:30px;
text-align:center;
border-radius:15px;
}

</style>

</head>

<body>

<header>
<h1>📊 Farm Expense Dashboard</h1>
</header>

<div class="expense-container">

<div class="expense-grid">

<div class="expense-card">

<h2>Add Expenses</h2>

<input type="number" id="seed" placeholder="Seed Cost">

<input type="number" id="fertilizer" placeholder="Fertilizer Cost">

<input type="number" id="labor" placeholder="Labor Cost">

<input type="number" id="transport" placeholder="Transport Cost">

<button onclick="calculateExpense()">
Calculate
</button>

</div>

<div class="expense-card">

<canvas id="expenseChart"></canvas>

</div>

</div>

<div class="total-card">

<h2>Total Expense</h2>

<h1 id="totalExpense">
₹0
</h1>

</div>

</div>

<script>

function calculateExpense(){

const seed =
Number(document.getElementById("seed").value);

const fertilizer =
Number(document.getElementById("fertilizer").value);

const labor =
Number(document.getElementById("labor").value);

const transport =
Number(document.getElementById("transport").value);

const total =
seed +
fertilizer +
labor +
transport;

document
.getElementById("totalExpense")
.innerText = "₹"+total;

const ctx =
document.getElementById("expenseChart");

new Chart(ctx,{

type:"pie",

data:{

labels:[
"Seed",
"Fertilizer",
"Labor",
"Transport"
],

datasets:[{

data:[
seed,
fertilizer,
labor,
transport
]

}]

}

});

}

</script>

</body>
</html>
