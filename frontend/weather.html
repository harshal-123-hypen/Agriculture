<!DOCTYPE html>
<html>
<head>

<title>Weather Information</title>

<link rel="stylesheet" href="style.css">

<style>

.weather-container{
padding:40px;
max-width:1200px;
margin:auto;
}

.weather-search{
display:flex;
gap:10px;
}

.weather-search input{
flex:1;
}

.weather-card{
margin-top:30px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
}

.weather-main{
font-size:50px;
font-weight:bold;
color:#2E7D32;
}

.forecast-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-top:30px;
}

.forecast{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
}

.advice{
margin-top:30px;
background:white;
padding:30px;
border-radius:15px;
}

</style>

</head>

<body>

<header>
<h1>🌦 Weather Information</h1>
</header>

<div class="weather-container">

<div class="weather-search">

<input
type="text"
id="city"
placeholder="Enter City">

<button id="getWeather">
Get Weather
</button>

</div>

<div class="weather-card">

<div class="weather-main">

31°C

</div>

<h2>Pune</h2>

<p>Humidity: 60%</p>
<p>Rainfall: 5mm</p>
<p>Wind Speed: 12 km/h</p>

</div>

<div class="forecast-grid">

<div class="forecast">Mon<br>30°C</div>
<div class="forecast">Tue<br>31°C</div>
<div class="forecast">Wed<br>29°C</div>
<div class="forecast">Thu<br>32°C</div>
<div class="forecast">Fri<br>30°C</div>

</div>

<div class="advice">

<h2>AI Farming Advice</h2>

<p>

Moderate rainfall expected.
Suitable for irrigation planning.

</p>

</div>

</div>

<script>

document
.getElementById("getWeather")
.addEventListener("click",async()=>{

const city =
document.getElementById("city").value;

/*

GET /weather?city=Pune

OpenWeather API

*/

});

</script>

</body>
</html>
