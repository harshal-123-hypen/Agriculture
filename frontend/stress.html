<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Stress Detection</title>

<link rel="stylesheet" href="style.css">


<style>

.upload-container{
max-width:900px;
margin:auto;
padding:40px;
}

.upload-box{
border:3px dashed #2E7D32;
padding:60px;
text-align:center;
border-radius:20px;
background:#fff;
cursor:pointer;
}

.preview{
margin-top:20px;
text-align:center;
}

.preview img{
width:300px;
border-radius:15px;
display:none;
}

.result-panel{
margin-top:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.result-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
}

.status{
font-size:32px;
font-weight:bold;
color:#4CAF50;
}

.solution{
margin-top:30px;
background:white;
padding:30px;
border-radius:15px;
}

</style>

</head>

<body>

<header>
<h1>🌿 Plant Stress Detection</h1>
</header>

<section class="upload-container">

<div class="upload-box">

<input type="file"
id="plantImage"
accept="image/*">

<p>
Upload Plant Leaf Image
</p>

</div>

<div class="preview">

<img id="previewImage">

</div>

<div class="result-panel">

<div class="result-box">
<h3>Status</h3>
<p class="status" id="plantStatus">
Healthy
</p>
</div>

<div class="result-box">
<h3>Confidence</h3>
<p id="confidence">
95%
</p>
</div>

<div class="result-box">
<h3>Severity</h3>
<p id="severity">
Low
</p>
</div>

</div>

<div class="solution">

<h2>Suggested Action</h2>

<ul>
<li>Apply balanced fertilizer.</li>
<li>Monitor soil moisture.</li>
<li>Check for fungal infections.</li>
<li>Inspect leaves weekly.</li>
</ul>

</div>

</section>

<script>

const imageInput =
document.getElementById("plantImage");

const preview =
document.getElementById("previewImage");

imageInput.addEventListener("change",(e)=>{

const file = e.target.files[0];

if(file){

preview.src =
URL.createObjectURL(file);

preview.style.display="block";

}

/*
Flask API

POST /detect-stress

*/

});

</script>

</body>
</html>
